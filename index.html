<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!--style css-->
    <link rel="stylesheet" href="assets/css/style.css">

    <!--media queries-->
    <link rel="stylesheet" href="assets/css/mediaQueries.css">

    <!--normalize css-->
    <link rel="stylesheet" href="assets/css/normalize.css">

    <!--bootsrp 5-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!--font awesome 5-->
    <link rel="stylesheet" href="assets/fontes/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">
</head>

<body>


    <main>
        <div class="containerContador"> <!--containerContador-->

            <section id="contador" class="container"> <!--contador-->


                <header id="hero-contador"> <!--hero-contador-->

                    <div class="hero-contador__icon">
                        <i class="fa-solid fa-hashtag"></i>
                    </div>

                    <div class="hero-contador__title">

                        <h1 class="title">
                            Contador
                        </h1>

                    </div>

                    <div class="hero-contador__text">

                        <p>
                            Simples,moderno e funcional
                        </p>

                    </div>



                </header><!--hero-contador-->


                <article id="boxNums"> <!--boxNums-->

                    <data value="0" id="number">0</data>

                    <p class="textNumber">
                        Positivo
                    </p>


                </article><!--boxNums-->






            </section><!--contador-->


            <section id="actions"> <!--actions-->

                <article id="boxActions">

                    <div class="diminuir  action_item" action="diminuir">
                        <i class="fa-solid fa-minus"></i>


                    </div>



                    <div class="resetar action_item" action="resetar">
                        <i class="fa-solid fa-arrow-rotate-left"></i>

                    </div>

                    <div class="aumentar action_item" action="aumentar">

                        <i class="fa-solid fa-plus"></i>

                    </div>

                </article>

            </section><!--actions-->


            <footer id="contadorFooter" class="container">

                <p> <i class="fa-solid fa-circle-info"></i> O contador não permite números negativos</p>


            </footer>


        </div><!--containerContador-->
    </main>

    <!--scripts-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <script src="assets/src/main.js"></script>
</body>

</html>
